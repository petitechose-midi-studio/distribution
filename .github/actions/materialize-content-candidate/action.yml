name: Materialize content candidate
description: Download and verify a signed content candidate asset into an output directory.

inputs:
  spec-path:
    description: Path to the release spec in the distribution repo.
    required: true
  target-id:
    description: Candidate target id.
    required: true
  out-dir:
    description: Output directory path, relative to the workspace checkout.
    required: true
  asset-filename:
    description: Optional candidate asset filename to copy.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Fetch candidate asset
      shell: bash
      run: |
        set -euo pipefail
        args=(
          --spec "../${{ inputs.spec-path }}"
          --target-id "${{ inputs.target-id }}"
          --out-dir "${{ inputs.out-dir }}"
        )
        if [ -n "${{ inputs.asset-filename }}" ]; then
          args+=(--asset-filename "${{ inputs.asset-filename }}")
        fi
        (
          cd workspace
          uv run ms release content fetch-candidate "${args[@]}"
        )
