name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Tests
        run: cargo test

      - name: Bundle packaging smoke
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/config/devices"
          printf 'loader' > "$tmp/midi-studio-loader-windows-x86_64.exe"
          printf 'bridge' > "$tmp/oc-bridge-windows-x86_64.exe"
          printf 'core-file-tool' > "$tmp/ms-core-file-tool-windows-x86_64.exe"
          printf 'default = true\n' > "$tmp/config/default.toml"
          printf "device = 'teensy'\n" > "$tmp/config/devices/teensy.toml"
          python scripts/package_bundle.py \
            --out "$tmp/bundle.zip" \
            --loader "$tmp/midi-studio-loader-windows-x86_64.exe" \
            --oc-bridge "$tmp/oc-bridge-windows-x86_64.exe" \
            --ms-core-file-tool "$tmp/ms-core-file-tool-windows-x86_64.exe" \
            --oc-bridge-config "$tmp/config"
          python - "$tmp/bundle.zip" <<'PY'
          import sys
          import zipfile

          required = {
              "bin/midi-studio-loader.exe",
              "bin/oc-bridge.exe",
              "bin/ms-core-file-tool.exe",
              "bin/config/default.toml",
              "bin/config/devices/teensy.toml",
          }
          with zipfile.ZipFile(sys.argv[1], "r") as zf:
              names = set(zf.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit("missing bundle entries: " + ", ".join(missing))
          PY
