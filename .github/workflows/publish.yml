name: Publish

run-name: Publish ${{ inputs.tag }} / ${{ inputs.channel }}

on:
  workflow_dispatch:
    inputs:
      channel:
        description: stable or beta
        required: true
        type: choice
        options:
          - stable
          - beta
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true
        type: string
      spec_path:
        description: Path to release spec JSON in this repo
        required: true
        type: string
      tooling_sha:
        description: ms-dev-env tooling SHA used for candidate resolution
        required: true
        type: string
      request_id:
        description: Optional dispatch correlation id
        required: false
        default: ""
        type: string

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  dispatch_marker:
    name: register dispatch
    if: ${{ inputs.request_id != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write dispatch marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dispatch
          cat > dispatch/marker.json <<'EOF'
          {"request_id":"${{ inputs.request_id }}"}
          EOF

      - name: Upload dispatch marker
        uses: actions/upload-artifact@v7
        with:
          name: dispatch-${{ inputs.request_id }}
          path: dispatch/marker.json
          retention-days: 1

  build_dist:
    name: Materialize dist + validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Setup release workspace
        uses: ./.github/actions/setup-release-workspace
        with:
          tooling-sha: ${{ inputs.tooling_sha }}

      - name: Materialize firmware and extension candidates
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release content fetch-candidate \
              --spec "../${{ inputs.spec_path }}" \
              --target-id core-default-firmware \
              --out-dir ../dist \
              --asset-filename midi-studio-default-firmware.hex
            uv run ms release content fetch-candidate \
              --spec "../${{ inputs.spec_path }}" \
              --target-id plugin-bitwig-firmware \
              --out-dir ../dist \
              --asset-filename midi-studio-bitwig-firmware.hex
            uv run ms release content fetch-candidate \
              --spec "../${{ inputs.spec_path }}" \
              --target-id plugin-bitwig-extension \
              --out-dir ../dist \
              --asset-filename midi_studio.bwextension
          )

      - name: Materialize loader and oc-bridge candidates
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release content fetch-candidate \
              --spec "../${{ inputs.spec_path }}" \
              --target-id loader-binaries \
              --out-dir ../dist \
              --asset-filename midi-studio-loader-windows-x86_64.exe \
              --asset-filename midi-studio-loader-linux-x86_64 \
              --asset-filename midi-studio-loader-macos-x86_64 \
              --asset-filename midi-studio-loader-macos-arm64
            uv run ms release content fetch-candidate \
              --spec "../${{ inputs.spec_path }}" \
              --target-id oc-bridge-binaries \
              --out-dir ../dist \
              --asset-filename oc-bridge-windows-x86_64.exe \
              --asset-filename oc-bridge-linux-x86_64 \
              --asset-filename oc-bridge-macos-x86_64 \
              --asset-filename oc-bridge-macos-arm64 \
              --asset-filename oc-bridge-config.zip
          )

      - name: Extract oc-bridge config
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("dist/oc-bridge-config.zip")
          out_dir = Path("dist/oc-bridge-config")
          out_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(archive, "r") as zf:
              zf.extractall(out_dir)
          PY

      - name: Package bundles
        shell: bash
        run: |
          set -euo pipefail
          python scripts/package_bundle.py \
            --out dist/midi-studio-windows-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-windows-x86_64.exe \
            --oc-bridge dist/oc-bridge-windows-x86_64.exe \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-linux-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-linux-x86_64 \
            --oc-bridge dist/oc-bridge-linux-x86_64 \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-macos-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-macos-x86_64 \
            --oc-bridge dist/oc-bridge-macos-x86_64 \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-macos-arm64-bundle.zip \
            --loader dist/midi-studio-loader-macos-arm64 \
            --oc-bridge dist/oc-bridge-macos-arm64 \
            --oc-bridge-config dist/oc-bridge-config

      - name: Validate dist against spec
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_dist.py --spec "${{ inputs.spec_path }}" --dist dist

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  release:
    name: Sign and publish release
    runs-on: ubuntu-latest
    needs: [build_dist]
    if: ${{ always() && needs.build_dist.result == 'success' }}
    environment: release
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Download dist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p assembled
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir assembled --name dist

      - name: Inspect assembled dist
        shell: bash
        run: |
          set -euo pipefail
          find assembled -maxdepth 3 -type f | sort

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manifest.py \
            --spec "${{ inputs.spec_path }}" \
            --dist assembled/dist \
            --out manifest.json

      - name: Sign manifest
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          cargo run -p ms-dist-manifest -- sign --in manifest.json --out manifest.json.sig

      - name: Verify manifest signature
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          PK=$(cargo run -p ms-dist-manifest -- pubkey)
          MS_DIST_ED25519_PK="$PK" cargo run -p ms-dist-manifest -- verify --in manifest.json --sig manifest.json.sig

      - name: Create GitHub Release (draft)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          EXTRA_FLAGS=()
          if [ "${{ inputs.channel }}" = "beta" ]; then
            EXTRA_FLAGS+=("--prerelease")
          fi

          NOTES_ARGS=()
          NOTES_FILE="release-notes/${{ inputs.tag }}.md"
          if [ -f "$NOTES_FILE" ]; then
            NOTES_ARGS+=("--notes-file" "$NOTES_FILE")
          else
            NOTES_ARGS+=("--notes" "channel=${{ inputs.channel }}")
          fi

          ASSETS=(assembled/dist/*.zip assembled/dist/*.hex assembled/dist/*.bwextension)
          gh release create "${{ inputs.tag }}" \
            "${ASSETS[@]}" \
            manifest.json manifest.json.sig \
            --title "${{ inputs.tag }}" \
            "${NOTES_ARGS[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --draft \
            "${EXTRA_FLAGS[@]}"

      - name: Verify uploaded assets match manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          rm -rf verify
          mkdir -p verify
          gh release download "${{ inputs.tag }}" --dir verify --repo "${GITHUB_REPOSITORY}"

          PK=$(cargo run -p ms-dist-manifest -- pubkey)
          MS_DIST_ED25519_PK="$PK" cargo run -p ms-dist-manifest -- verify --in verify/manifest.json --sig verify/manifest.json.sig
          python scripts/verify_manifest_assets.py --manifest verify/manifest.json --assets-dir verify

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${{ inputs.tag }}" --draft=false --repo "${GITHUB_REPOSITORY}"
