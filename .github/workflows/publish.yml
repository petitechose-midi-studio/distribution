name: Publish

run-name: Publish ${{ inputs.tag }} / ${{ inputs.channel }} / ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      channel:
        description: stable or beta
        required: true
        type: choice
        options:
          - stable
          - beta
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true
        type: string
      spec_path:
        description: Path to release spec JSON in this repo
        required: true
        type: string
      request_id:
        description: Optional dispatch correlation id
        required: false
        default: ""
        type: string

concurrency:
  group: publish-${{ inputs.tag }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  plan:
    name: Plan (reuse vs build)
    runs-on: ubuntu-latest
    outputs:
      build_bundles: ${{ steps.flags.outputs.build_bundles }}
      build_firmware_default: ${{ steps.flags.outputs.build_firmware_default }}
      build_firmware_bitwig: ${{ steps.flags.outputs.build_firmware_bitwig }}
      build_bitwig_extension: ${{ steps.flags.outputs.build_bitwig_extension }}

    steps:
      - name: Checkout distribution (with tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute reuse plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Public key for stable/beta (not secret).
          # Keep in sync with the key embedded in ms-manager.
          MS_DIST_ED25519_PK: 2rHtM99leFGTpjZ8fZHNCdGXlEKmAw6hEyaat1uGO3M=
        run: |
          set -euo pipefail
          mkdir -p out
          python scripts/build_manifest_with_reuse.py plan \
            --spec "${{ inputs.spec_path }}" \
            --out out/reuse-plan.json \
            --repo "${GITHUB_REPOSITORY}" \
            --workspace-root .

      - name: Export plan flags
        id: flags
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          p = json.load(open('out/reuse-plan.json', 'r', encoding='utf-8'))
          b = p.get('build', {})
          def flag(key: str) -> int:
              return 1 if b.get(key) is True else 0
          print(f"build_bundles={flag('bundles')}")
          print(f"build_firmware_default={flag('firmware_default')}")
          print(f"build_firmware_bitwig={flag('firmware_bitwig')}")
          print(f"build_bitwig_extension={flag('bitwig_extension')}")
          PY

      - name: Upload plan
        uses: actions/upload-artifact@v7
        with:
          name: reuse-plan
          path: out/reuse-plan.json

  build_bundles:
    name: Package bundles (${{ matrix.bundle_os }}-${{ matrix.arch }})
    needs: [plan]
    if: needs.plan.outputs.build_bundles == '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            bundle_os: windows
            arch: x86_64
            loader_filename: midi-studio-loader-windows-x86_64.exe
            bridge_filename: oc-bridge-windows-x86_64.exe
          - runner: ubuntu-latest
            bundle_os: linux
            arch: x86_64
            loader_filename: midi-studio-loader-linux-x86_64
            bridge_filename: oc-bridge-linux-x86_64
          - runner: macos-15-intel
            bundle_os: macos
            arch: x86_64
            loader_filename: midi-studio-loader-macos-x86_64
            bridge_filename: oc-bridge-macos-x86_64
          - runner: macos-latest
            bundle_os: macos
            arch: arm64
            loader_filename: midi-studio-loader-macos-arm64
            bridge_filename: oc-bridge-macos-arm64


    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Read release spec
        id: spec
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.spec_path }}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys

          path = "${{ inputs.spec_path }}"
          spec = json.load(open(path, "r", encoding="utf-8"))

          def get_sha(repo_id: str) -> str:
              for r in spec.get("repos", []):
                  if r.get("id") == repo_id:
                      sha = r.get("sha")
                      if not isinstance(sha, str) or len(sha) != 40:
                          raise SystemExit(f"invalid sha for {repo_id}: {sha!r}")
                      return sha
              raise SystemExit(f"missing repo id in spec: {repo_id}")

          print(f"loader_sha={get_sha('loader')}")
          print(f"bridge_sha={get_sha('oc-bridge')}")
          tooling = spec.get("tooling")
          if not isinstance(tooling, dict):
              raise SystemExit("missing tooling block in spec")
          tooling_sha = tooling.get("sha")
          if not isinstance(tooling_sha, str) or len(tooling_sha) != 40:
              raise SystemExit(f"invalid tooling sha in spec: {tooling_sha!r}")
          print(f"tooling_sha={tooling_sha}")
          PY

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.spec.outputs.tooling_sha }}
          path: workspace

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Checkout oc-bridge config
        uses: actions/checkout@v6
        with:
          repository: open-control/bridge
          ref: ${{ steps.spec.outputs.bridge_sha }}
          path: src/oc-bridge

      - name: Materialize loader candidate
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release candidate fetch \
              --producer-id loader-binaries \
              --candidate-tag "rc-${{ steps.spec.outputs.loader_sha }}-tooling-${{ steps.spec.outputs.tooling_sha }}" \
              --out-dir ../dist \
              --asset-filename "${{ matrix.loader_filename }}" \
              --input-repo "loader=petitechose-midi-studio/loader=${{ steps.spec.outputs.loader_sha }}" \
              --input-repo "ms-dev-env=petitechose-midi-studio/ms-dev-env=${{ steps.spec.outputs.tooling_sha }}"
          )

      - name: Materialize oc-bridge candidate
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release candidate fetch \
              --producer-id oc-bridge-binaries \
              --candidate-tag "rc-${{ steps.spec.outputs.bridge_sha }}-tooling-${{ steps.spec.outputs.tooling_sha }}" \
              --out-dir ../dist \
              --asset-filename "${{ matrix.bridge_filename }}" \
              --input-repo "oc-bridge=open-control/bridge=${{ steps.spec.outputs.bridge_sha }}" \
              --input-repo "ms-dev-env=petitechose-midi-studio/ms-dev-env=${{ steps.spec.outputs.tooling_sha }}"
          )

      - name: Package bundle
        shell: bash
        run: |
          set -euo pipefail
          LOADER="dist/${{ matrix.loader_filename }}"
          BRIDGE="dist/${{ matrix.bridge_filename }}"
          test -f "$LOADER"
          test -f "$BRIDGE"
          OUT="dist/midi-studio-${{ matrix.bundle_os }}-${{ matrix.arch }}-bundle.zip"
          python scripts/package_bundle.py --out "$OUT" --loader "$LOADER" --oc-bridge "$BRIDGE" --oc-bridge-config "src/oc-bridge/config"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: midi-studio-${{ matrix.bundle_os }}-${{ matrix.arch }}-bundle
          path: dist/midi-studio-${{ matrix.bundle_os }}-${{ matrix.arch }}-bundle.zip

  assemble:
    name: Assemble dist (copy reuse) + validate
    runs-on: ubuntu-latest
    needs: [plan, build_bundles, build_core_firmware, build_bitwig_firmware, build_bitwig_extension]
    if: >-
      ${{
        always() &&
        needs.plan.result == 'success' &&
        (needs.build_bundles.result == 'success' || needs.build_bundles.result == 'skipped') &&
        (needs.build_core_firmware.result == 'success' || needs.build_core_firmware.result == 'skipped') &&
        (needs.build_bitwig_firmware.result == 'success' || needs.build_bitwig_firmware.result == 'skipped') &&
        (needs.build_bitwig_extension.result == 'success' || needs.build_bitwig_extension.result == 'skipped')
      }}

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Download artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist_flat
          find dist -maxdepth 5 -type f \( -name '*.zip' -o -name '*.hex' -o -name '*.bwextension' \) -print -exec cp '{}' dist_flat/ \;
          ls -la dist_flat || true

      - name: Locate reuse plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import glob
          paths = glob.glob('dist/**/reuse-plan.json', recursive=True)
          if not paths:
            raise SystemExit('reuse-plan.json not found in downloaded artifacts')
          print(f"path={paths[0]}")
          PY

      - name: Copy reuse plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp "${{ steps.plan.outputs.path }}" out/reuse-plan.json

      - name: Materialize reused assets (copy reuse)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manifest_with_reuse.py materialize \
            --spec "${{ inputs.spec_path }}" \
            --dist dist_flat \
            --plan out/reuse-plan.json

      - name: Validate dist against spec
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_dist.py --spec "${{ inputs.spec_path }}" --dist dist_flat

      - name: Build manifest preview (with reuse)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manifest_with_reuse.py build \
            --spec "${{ inputs.spec_path }}" \
            --dist dist_flat \
            --plan out/reuse-plan.json \
            --out out/manifest.preview.json

      - name: Upload assembled dist
        uses: actions/upload-artifact@v7
        with:
          name: assembled-dist
          path: |
            dist_flat
            out/reuse-plan.json
            out/manifest.preview.json

  release:
    name: Sign and publish release
    runs-on: ubuntu-latest
    needs: [assemble]
    if: >-
      ${{
        always() &&
        needs.assemble.result == 'success'
      }}
    environment: release
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Download assembled dist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p assembled
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir assembled --name assembled-dist

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build manifest (with reuse)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manifest_with_reuse.py build \
            --spec "${{ inputs.spec_path }}" \
            --dist assembled/dist_flat \
            --plan assembled/out/reuse-plan.json \
            --out manifest.json

      - name: Sign manifest
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          cargo run -p ms-dist-manifest -- sign --in manifest.json --out manifest.json.sig

      - name: Verify manifest signature
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          PK=$(cargo run -p ms-dist-manifest -- pubkey)
          MS_DIST_ED25519_PK="$PK" cargo run -p ms-dist-manifest -- verify --in manifest.json --sig manifest.json.sig

      - name: Create GitHub Release (draft)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          EXTRA_FLAGS=()
          if [ "${{ inputs.channel }}" = "beta" ]; then
            EXTRA_FLAGS+=("--prerelease")
          fi

          NOTES_ARGS=()
          NOTES_FILE="release-notes/${{ inputs.tag }}.md"
          if [ -f "$NOTES_FILE" ]; then
            NOTES_ARGS+=("--notes-file" "$NOTES_FILE")
          else
            NOTES_ARGS+=("--notes" "channel=${{ inputs.channel }}")
          fi

          ASSETS=(assembled/dist_flat/*.zip assembled/dist_flat/*.hex assembled/dist_flat/*.bwextension)
          gh release create "${{ inputs.tag }}" \
            "${ASSETS[@]}" \
            manifest.json manifest.json.sig \
            --title "${{ inputs.tag }}" \
            "${NOTES_ARGS[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --draft \
            "${EXTRA_FLAGS[@]}"

      - name: Verify uploaded assets match manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK }}
        run: |
          set -euo pipefail
          rm -rf verify
          mkdir -p verify
          gh release download "${{ inputs.tag }}" --dir verify --repo "${GITHUB_REPOSITORY}"

          PK=$(cargo run -p ms-dist-manifest -- pubkey)
          MS_DIST_ED25519_PK="$PK" cargo run -p ms-dist-manifest -- verify --in verify/manifest.json --sig verify/manifest.json.sig
          python scripts/verify_manifest_assets.py --manifest verify/manifest.json --assets-dir verify

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${{ inputs.tag }}" --draft=false --repo "${GITHUB_REPOSITORY}"

  build_core_firmware:
    name: Fetch core firmware (default)
    needs: [plan]
    if: needs.plan.outputs.build_firmware_default == '1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Read release spec
        id: spec
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.spec_path }}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          spec = json.load(open("${{ inputs.spec_path }}", "r", encoding="utf-8"))
          repos = {r["id"]: r["sha"] for r in spec.get("repos", [])}
          def get(repo_id: str) -> str:
              sha = repos.get(repo_id)
              if not isinstance(sha, str) or len(sha) != 40:
                  raise SystemExit(f"missing/invalid sha for {repo_id}: {sha!r}")
              return sha
          print(f"core_sha={get('core')}")
          tooling = spec.get("tooling")
          if not isinstance(tooling, dict):
              raise SystemExit("missing tooling block in spec")
          tooling_sha = tooling.get("sha")
          if not isinstance(tooling_sha, str) or len(tooling_sha) != 40:
              raise SystemExit(f"invalid tooling sha in spec: {tooling_sha!r}")
          print(f"tooling_sha={tooling_sha}")
          PY

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.spec.outputs.tooling_sha }}
          path: workspace

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Materialize core firmware candidate
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release candidate fetch \
              --producer-id core-default-firmware \
              --candidate-tag "rc-${{ steps.spec.outputs.core_sha }}-tooling-${{ steps.spec.outputs.tooling_sha }}" \
              --out-dir ../dist \
              --asset-filename "midi-studio-default-firmware.hex" \
              --input-repo "core=petitechose-midi-studio/core=${{ steps.spec.outputs.core_sha }}" \
              --input-repo "ms-dev-env=petitechose-midi-studio/ms-dev-env=${{ steps.spec.outputs.tooling_sha }}"
          )

      - name: Upload core firmware
        uses: actions/upload-artifact@v7
        with:
          name: midi-studio-default-firmware
          path: dist/midi-studio-default-firmware.hex

  build_bitwig_firmware:
    name: Fetch bitwig firmware
    needs: [plan]
    if: needs.plan.outputs.build_firmware_bitwig == '1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Read release spec
        id: spec
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.spec_path }}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          spec = json.load(open("${{ inputs.spec_path }}", "r", encoding="utf-8"))
          repos = {r["id"]: r["sha"] for r in spec.get("repos", [])}
          def get(repo_id: str) -> str:
              sha = repos.get(repo_id)
              if not isinstance(sha, str) or len(sha) != 40:
                  raise SystemExit(f"missing/invalid sha for {repo_id}: {sha!r}")
              return sha
          print(f"core_sha={get('core')}")
          print(f"bitwig_sha={get('plugin-bitwig')}")
          tooling = spec.get("tooling")
          if not isinstance(tooling, dict):
              raise SystemExit("missing tooling block in spec")
          tooling_sha = tooling.get("sha")
          if not isinstance(tooling_sha, str) or len(tooling_sha) != 40:
              raise SystemExit(f"invalid tooling sha in spec: {tooling_sha!r}")
          print(f"tooling_sha={tooling_sha}")
          PY

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.spec.outputs.tooling_sha }}
          path: workspace

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Checkout core
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/core
          ref: ${{ steps.spec.outputs.core_sha }}
          path: src/midi-studio/core

      - name: Resolve ui SHA from core release pin
        id: ui
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          text = Path("src/midi-studio/core/platformio.ini").read_text(encoding="utf-8")
          match = re.search(
              r"(?m)^\s*ms-ui=https://github\.com/petitechose-midi-studio/ui\.git#([0-9a-f]{40})\s*$",
              text,
          )
          if match is None:
              raise SystemExit("missing pinned ms-ui dependency in core/platformio.ini")
          print(f"ui_sha={match.group(1)}")
          PY

      - name: Materialize bitwig firmware candidate
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release candidate fetch \
              --producer-id plugin-bitwig-firmware \
              --candidate-tag "rc-plugin-bitwig-firmware-${{ steps.spec.outputs.core_sha }}-${{ steps.spec.outputs.bitwig_sha }}-tooling-${{ steps.spec.outputs.tooling_sha }}" \
              --out-dir ../dist \
              --asset-filename "midi-studio-bitwig-firmware.hex" \
              --input-repo "plugin-bitwig=petitechose-midi-studio/plugin-bitwig=${{ steps.spec.outputs.bitwig_sha }}" \
              --input-repo "core=petitechose-midi-studio/core=${{ steps.spec.outputs.core_sha }}" \
              --input-repo "ui=petitechose-midi-studio/ui=${{ steps.ui.outputs.ui_sha }}" \
              --input-repo "ms-dev-env=petitechose-midi-studio/ms-dev-env=${{ steps.spec.outputs.tooling_sha }}"
          )

      - name: Upload bitwig firmware
        uses: actions/upload-artifact@v7
        with:
          name: midi-studio-bitwig-firmware
          path: dist/midi-studio-bitwig-firmware.hex

  build_bitwig_extension:
    name: Fetch Bitwig extension
    needs: [plan]
    if: needs.plan.outputs.build_bitwig_extension == '1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Read release spec
        id: spec
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.spec_path }}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          spec = json.load(open("${{ inputs.spec_path }}", "r", encoding="utf-8"))
          repos = {r["id"]: r["sha"] for r in spec.get("repos", [])}
          sha = repos.get("plugin-bitwig")
          if not isinstance(sha, str) or len(sha) != 40:
              raise SystemExit(f"missing/invalid sha for plugin-bitwig: {sha!r}")
          print(f"bitwig_sha={sha}")
          tooling = spec.get("tooling")
          if not isinstance(tooling, dict):
              raise SystemExit("missing tooling block in spec")
          tooling_sha = tooling.get("sha")
          if not isinstance(tooling_sha, str) or len(tooling_sha) != 40:
              raise SystemExit(f"invalid tooling sha in spec: {tooling_sha!r}")
          print(f"tooling_sha={tooling_sha}")
          PY

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.spec.outputs.tooling_sha }}
          path: workspace

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Materialize bitwig extension candidate
        shell: bash
        run: |
          set -euo pipefail
          (
            cd workspace
            uv run ms release candidate fetch \
              --producer-id plugin-bitwig-extension \
              --candidate-tag "rc-plugin-bitwig-extension-${{ steps.spec.outputs.bitwig_sha }}-tooling-${{ steps.spec.outputs.tooling_sha }}" \
              --out-dir ../dist \
              --asset-filename "midi_studio.bwextension" \
              --input-repo "plugin-bitwig=petitechose-midi-studio/plugin-bitwig=${{ steps.spec.outputs.bitwig_sha }}" \
              --input-repo "ms-dev-env=petitechose-midi-studio/ms-dev-env=${{ steps.spec.outputs.tooling_sha }}"
          )

      - name: Upload bitwig extension
        uses: actions/upload-artifact@v7
        with:
          name: midi-studio-bitwig-extension
          path: dist/midi_studio.bwextension
