name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      tag_override:
        description: Optional tag override for manual runs (avoid nightly-YYYY-MM-DD to not interfere with real nightlies)
        required: false
        type: string

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  select_spec:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.select.outputs.should_publish }}
      tag: ${{ steps.tag.outputs.tag }}
      tooling_sha: ${{ steps.tooling.outputs.tooling_sha }}
    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Compute tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag_override }}"
          if [ -z "$TAG" ]; then
            TAG="nightly-$(date -u +%Y-%m-%d)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Read release tooling
        id: tooling
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          tooling = json.loads(Path(".github/release-tooling.json").read_text(encoding="utf-8"))
          sha = tooling.get("sha")
          if not isinstance(sha, str) or len(sha) != 40:
              raise SystemExit(f"invalid tooling sha: {sha!r}")
          print(f"tooling_sha={sha}")
          PY

      - name: Select latest green SHAs
        id: select
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p out
          set +e
          python scripts/select_latest_green.py \
            --template release-specs/nightly.template.json \
            --tooling-file .github/release-tooling.json \
            --out out/release-spec.json \
            --tag "$TAG"
          RC=$?
          set -e

          if [ "$RC" -eq 0 ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
          elif [ "$RC" -eq 2 ]; then
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            exit 0
          else
            exit "$RC"
          fi

      - name: Upload spec
        if: steps.select.outputs.should_publish == '1'
        uses: actions/upload-artifact@v7
        with:
          name: nightly-release-spec
          path: out/release-spec.json

  build_dist:
    name: Materialize dist + validate
    runs-on: ubuntu-latest
    needs: [select_spec]
    if: needs.select_spec.outputs.should_publish == '1'

    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Download release spec
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p spec
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir spec --name nightly-release-spec

      - name: Setup release workspace
        uses: ./.github/actions/setup-release-workspace
        with:
          tooling-sha: ${{ needs.select_spec.outputs.tooling_sha }}

      - name: Materialize firmware and extension candidates
        shell: bash
        run: |
          set -euo pipefail
          declare -a targets=(
            "core-default-firmware:midi-studio-default-firmware.hex"
            "plugin-bitwig-firmware:midi-studio-bitwig-firmware.hex"
            "plugin-bitwig-extension:midi_studio.bwextension"
          )
          (
            cd workspace
            for entry in "${targets[@]}"; do
              target_id="${entry%%:*}"
              asset_filename="${entry#*:}"
              uv run ms release content fetch-candidate \
                --spec ../spec/release-spec.json \
                --target-id "$target_id" \
                --out-dir ../dist \
                --asset-filename "$asset_filename"
            done
          )

      - name: Materialize loader and oc-bridge candidates
        shell: bash
        run: |
          set -euo pipefail
          declare -a targets=(
            "loader-binaries:midi-studio-loader-windows-x86_64.exe"
            "loader-binaries:midi-studio-loader-linux-x86_64"
            "loader-binaries:midi-studio-loader-macos-x86_64"
            "loader-binaries:midi-studio-loader-macos-arm64"
            "oc-bridge-binaries:oc-bridge-windows-x86_64.exe"
            "oc-bridge-binaries:oc-bridge-linux-x86_64"
            "oc-bridge-binaries:oc-bridge-macos-x86_64"
            "oc-bridge-binaries:oc-bridge-macos-arm64"
            "oc-bridge-binaries:oc-bridge-config.zip"
          )
          (
            cd workspace
            for entry in "${targets[@]}"; do
              target_id="${entry%%:*}"
              asset_filename="${entry#*:}"
              uv run ms release content fetch-candidate \
                --spec ../spec/release-spec.json \
                --target-id "$target_id" \
                --out-dir ../dist \
                --asset-filename "$asset_filename"
            done
          )

      - name: Extract oc-bridge config
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("dist/oc-bridge-config.zip")
          out_dir = Path("dist/oc-bridge-config")
          out_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(archive, "r") as zf:
              zf.extractall(out_dir)
          PY

      - name: Package bundles
        shell: bash
        run: |
          set -euo pipefail
          python scripts/package_bundle.py \
            --out dist/midi-studio-windows-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-windows-x86_64.exe \
            --oc-bridge dist/oc-bridge-windows-x86_64.exe \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-linux-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-linux-x86_64 \
            --oc-bridge dist/oc-bridge-linux-x86_64 \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-macos-x86_64-bundle.zip \
            --loader dist/midi-studio-loader-macos-x86_64 \
            --oc-bridge dist/oc-bridge-macos-x86_64 \
            --oc-bridge-config dist/oc-bridge-config
          python scripts/package_bundle.py \
            --out dist/midi-studio-macos-arm64-bundle.zip \
            --loader dist/midi-studio-loader-macos-arm64 \
            --oc-bridge dist/oc-bridge-macos-arm64 \
            --oc-bridge-config dist/oc-bridge-config

      - name: Validate dist against spec
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_dist.py --spec spec/release-spec.json --dist dist

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  release:
    runs-on: ubuntu-latest
    needs: [select_spec, build_dist]
    if: >-
      ${{
        always() &&
        needs.select_spec.outputs.should_publish == '1' &&
        needs.build_dist.result == 'success'
      }}
    environment: nightly
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout distribution
        uses: actions/checkout@v6

      - name: Download release spec
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p spec
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir spec --name nightly-release-spec

      - name: Download dist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p assembled
          gh run download "${{ github.run_id }}" --repo "${GITHUB_REPOSITORY}" --dir assembled --name dist

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manifest.py \
            --spec spec/release-spec.json \
            --dist assembled/dist \
            --out manifest.json

      - name: Sign manifest (nightly)
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK_NIGHTLY }}
        run: |
          set -euo pipefail
          cargo run -p ms-dist-manifest -- sign --in manifest.json --out manifest.json.sig

      - name: Verify manifest signature
        shell: bash
        env:
          MS_DIST_ED25519_SK: ${{ secrets.MS_DIST_ED25519_SK_NIGHTLY }}
        run: |
          set -euo pipefail
          PK=$(cargo run -p ms-dist-manifest -- pubkey)
          MS_DIST_ED25519_PK="$PK" cargo run -p ms-dist-manifest -- verify --in manifest.json --sig manifest.json.sig

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ASSETS=(assembled/dist/*.zip assembled/dist/*.hex assembled/dist/*.bwextension)
          gh release create "${{ needs.select_spec.outputs.tag }}" \
            "${ASSETS[@]}" \
            manifest.json manifest.json.sig \
            --title "${{ needs.select_spec.outputs.tag }}" \
            --notes "channel=nightly" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}"
